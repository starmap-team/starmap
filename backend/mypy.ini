[mypy]
python_version = 3.11
ignore_missing_imports = True
strict = False
warn_return_any = False
warn_unused_configs = False

# Suppress specific error codes for known patterns
[mypy-app.services.graph_service]
disable_error_code = index, attr-defined

[mypy-app.api.v1.graph]
disable_error_code = arg-type

[mypy-app.api.v1.admin]
disable_error_code = call-arg

[mypy-app.api.v1.evolution]
disable_error_code = arg-type

[mypy-app.core.evolution.orchestrator]
disable_error_code = misc

[mypy-app.services.match_service]
disable_error_code = misc
